<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ucube Veri Yükleyici PRO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0c10; color: #e2e8f0; font-family: sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #0f1117; border: 1px solid #1e2130; border-radius: 16px; padding: 28px; width: 100%; max-width: 650px; }
  h1 { font-size: 22px; font-weight: 800; background: linear-gradient(to right, #f97316, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; text-align: center; }
  textarea { width: 100%; height: 350px; background: #141720; border: 1px solid #1e2130; border-radius: 10px; color: #e2e8f0; font-size: 13px; padding: 12px; resize: vertical; outline: none; font-family: monospace; }
  textarea:focus { border-color: #f97316; }
  .btns { display: flex; gap: 10px; margin-top: 14px; }
  button { flex: 1; padding: 14px; border-radius: 10px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #btnRun { background: linear-gradient(to right, #f97316, #b45309); color: white; }
  #btnClear { background: #1e2130; color: #94a3b8; flex: 0.3; }
  #status { margin-top: 14px; padding: 12px; border-radius: 10px; font-size: 13px; display: none; white-space: pre-line; line-height: 1.5; }
  .ok { background: #14532d; color: #86efac; border: 1px solid #166534; }
  .err { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
  .loading { background: #1e2130; color: #94a3b8; border: 1px solid #2d3748; }
</style>
</head>
<body>
<div class="card">
  <h1>📋 Cafe Rank Veri Otomasyonu</h1>
  <textarea id="txt" placeholder="Sitedeki tüm metni (Ctrl+A -> Ctrl+C) kopyalayıp buraya yapıştırın..."></textarea>
  <div class="btns">
    <button id="btnRun" onclick="run()">▶ Verileri Analiz Et & Güncelle</button>
    <button id="btnClear" onclick="document.getElementById('txt').value='';setStatus('')">Temizle</button>
  </div>
  <div id="status"></div>
</div>

<script>
const supabaseUrl = 'https://hcxwjnkywsfwviexjopt.supabase.co';
const supabaseKey = 'sb_publishable_ZJFVMWFEHL32yXZXzqT4ZQ_3fNbZTO-';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

function setStatus(msg, type) {
  const el = document.getElementById('status');
  if (!msg) { el.style.display = 'none'; return; }
  el.className = type;
  el.textContent = msg;
  el.style.display = 'block';
}

function parseAndDeduplicate(text) {
  const userMap = new Map();
  const blacklistSet = new Set();
  
  const blacklistParts = text.split(/blacklist/i);
  const mainContent = blacklistParts[0];
  const blacklistContent = blacklistParts.slice(1).join(' ');

  const blacklistMatches = blacklistContent.match(/[^\s]+#[0-9]{4}/g);
  if (blacklistMatches) {
    blacklistMatches.forEach(n => blacklistSet.add(n.trim()));
  }

  const regex = /([^\s]+#[0-9]{4})(?:\s+[^\s]+#[0-9]{4})?\s+([\d.]+)\s+(\d+)\s+(\d{2}\/\d{2}\s+\d{2}:\d{2}|-)/g;
  let match;

  while ((match = regex.exec(mainContent)) !== null) {
    const cleanNick = match[1].trim();

    if (cleanNick.endsWith('#0000') || blacklistSet.has(cleanNick) || !cleanNick.includes('#')) {
      continue;
    }

    const messages = parseInt(match[2].replace(/\./g, ''), 10);
    const topics = parseInt(match[3], 10);
    const last_message = match[4].trim();

    if (!isNaN(messages) && !isNaN(topics)) {
      userMap.set(cleanNick, { nick: cleanNick, messages, topics, last_message });
    }
  }

  return Array.from(userMap.values());
}

async function run() {
  const text = document.getElementById('txt').value.trim();
  if (!text) return setStatus('Metin alanı boş bırakılamaz!', 'err');
  
  const btn = document.getElementById('btnRun');
  btn.disabled = true;
  setStatus('Kopyalanan metin analiz ediliyor, ucube filtreleri devrede...', 'loading');

  try {
    const currentCleanData = parseAndDeduplicate(text);
    if (currentCleanData.length === 0) {
      throw new Error('Metinden geçerli bir kullanıcı verisi veya istatistik ayırt edilemedi. Formatı kontrol edin.');
    }

    setStatus('Bir önceki yüklemenin geçmiş verileri (ucube_history) çekiliyor...', 'loading');
    const { data: historyData, error: historyError } = await _supabase
      .from('ucube_history')
      .select('id, raw_text')
      .order('id', { ascending: false })
      .limit(1);

    const oldUcubeMap = {};
    let hasHistory = false;
    let existingHistoryId = null;

    if (!historyError && historyData && historyData.length > 0) {
      hasHistory = true;
      existingHistoryId = historyData[0].id;
      if (historyData[0].raw_text) {
        const parsedOldData = parseAndDeduplicate(historyData[0].raw_text);
        parsedOldData.forEach(u => {
          oldUcubeMap[u.nick] = { messages: u.messages, topics: u.topics };
        });
      }
    }

    setStatus('Mevcut Supabase canlı veritabanı kayıtları sorgulanıyor...', 'loading');
    const nicks = currentCleanData.map(u => u.nick);
    
    const { data: supabaseUsers, error: fetchError } = await _supabase
      .from('stats')
      .select('id, nick, messages, topics, last_message')
      .in('nick', nicks);

    if (fetchError) throw fetchError;

    const supabaseMap = new Map();
    if (supabaseUsers) {
      supabaseUsers.forEach(u => supabaseMap.set(u.nick, u));
    }

    const finalUpsertList = [];
    let updatedCount = 0;

    currentCleanData.forEach(incomingUser => {
      const oldUcubeUser = oldUcubeMap[incomingUser.nick];
      const dbUser = supabaseMap.get(incomingUser.nick);

      let msgDiff = 0;
      let topicDiff = 0;

      if (oldUcubeUser) {
        msgDiff = Math.max(0, incomingUser.messages - oldUcubeUser.messages);
        topicDiff = Math.max(0, incomingUser.topics - oldUcubeUser.topics);
      }

      if (dbUser) {
        if (msgDiff > 0 || topicDiff > 0 || dbUser.last_message !== incomingUser.last_message || !hasHistory) {
          const finalMessages = hasHistory ? (dbUser.messages + msgDiff) : dbUser.messages;
          const finalTopics = hasHistory ? (dbUser.topics + topicDiff) : dbUser.topics;

          finalUpsertList.push({
            id: dbUser.id,
            nick: incomingUser.nick,
            messages: finalMessages,
            topics: finalTopics,
            last_message: incomingUser.last_message,
            updated_at: new Date().toISOString()
          });
          if (msgDiff > 0 || topicDiff > 0) updatedCount++;
        }
      } else {
        finalUpsertList.push({
          nick: incomingUser.nick,
          messages: incomingUser.messages,
          topics: incomingUser.topics,
          last_message: incomingUser.last_message,
          updated_at: new Date().toISOString()
        });
        updatedCount++;
      }
    });

    if (finalUpsertList.length > 0) {
      setStatus('Hesaplanan net farklar veritabanına (stats) işleniyor...', 'loading');
      const { error: upsertError } = await _supabase.from('stats').upsert(finalUpsertList);
      if (upsertError) throw upsertError;
    }

    setStatus('Bu veri seti bir sonraki kıyaslama için ucube_history tablosuna kaydediliyor...', 'loading');
    
    let historyPayload = { raw_text: text, updated_at: new Date().toISOString() };
    let historyQuery;

    if (existingHistoryId !== null) {
      historyPayload.id = existingHistoryId;
      historyQuery = _supabase.from('ucube_history').upsert(historyPayload);
    } else {
      historyQuery = _supabase.from('ucube_history').insert(historyPayload);
    }

    const { error: saveError } = await historyQuery;
    if (saveError) throw saveError;

    setStatus(`✅ Kusursuz Şekilde Tamamlandı!\n\nNoktalı büyük sayılar ve ucube çift isim satırları başarıyla temizlendi.\nAktif olarak istatistiği artan/güncellenen oyuncu sayısı: ${updatedCount}`, 'ok');

  } catch (e) { 
    setStatus('❌ Hata Meydana Geldi:\n' + e.message, 'err'); 
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
