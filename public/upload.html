<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veri Yükle</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0c10; color: #e2e8f0; font-family: sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #0f1117; border: 1px solid #1e2130; border-radius: 16px; padding: 28px; width: 100%; max-width: 600px; }
  h1 { font-size: 20px; font-weight: 800; background: linear-gradient(to right, #f97316, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
  textarea { width: 100%; height: 320px; background: #141720; border: 1px solid #1e2130; border-radius: 10px; color: #e2e8f0; font-size: 13px; padding: 12px; resize: vertical; outline: none; font-family: monospace; }
  textarea:focus { border-color: #f97316; }
  .btns { display: flex; gap: 10px; margin-top: 14px; }
  button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #btnRun { background: linear-gradient(to right, #f97316, #f59e0b); color: white; }
  #btnClear { background: #1e2130; color: #94a3b8; flex: 0.4; }
  #status { margin-top: 14px; padding: 12px; border-radius: 10px; font-size: 13px; display: none; }
  .ok { background: #14532d; color: #86efac; border: 1px solid #166534; }
  .err { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
  .loading { background: #1e2130; color: #94a3b8; border: 1px solid #2d3748; }
</style>
</head>
<body>
<div class="card">
  <h1>📋 Veri Yükle</h1>
  <textarea id="txt" placeholder="ucube.cafe → Ctrl+A → Ctrl+C → buraya Ctrl+V"></textarea>
  <div class="btns">
    <button id="btnRun" onclick="run()">▶ Güncelle</button>
    <button id="btnClear" onclick="document.getElementById('txt').value='';setStatus('')">Temizle</button>
  </div>
  <div id="status"></div>
</div>

<script>
const SUPABASE_URL = 'https://YOUR_SUPABASE_PROJECT_URL.supabase.co';
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function setStatus(msg, type) {
  const el = document.getElementById('status');
  if (!msg) { el.style.display = 'none'; return; }
  el.className = type;
  el.textContent = msg;
  el.style.display = 'block';
}

function parseAndDeduplicate(text) {
  const lowerText = text.toLowerCase();
  const blacklistIndex = lowerText.indexOf("blacklist");
  let mainText = text;
  let blacklistSet = new Set();

  if (blacklistIndex !== -1) {
    mainText = text.substring(0, blacklistIndex);
    const blacklistSection = text.substring(blacklistIndex);
    const blacklistMatches = blacklistSection.match(/([a-zA-Z0-9_\-\.\s]+#[0-9]{4})/g);
    if (blacklistMatches) {
      blacklistMatches.forEach(tag => blacklistSet.add(tag.trim()));
    }
  }

  const regex = /([a-zA-Z0-9_\-\.\s]+#[0-9]{4})\s+\1\s+([\d\.]+)\s+(\d+)\s+(\d{2}\/\d{2}\s+\d{2}:\d{2})\s+(lvl\s+\d+)/g;
  const userMap = new Map();
  let match;

  while ((match = regex.exec(mainText)) !== null) {
    const username = match[1].trim();
    if (blacklistSet.has(username)) continue;

    const mesaj = parseInt(match[2].replace(/\./g, ''), 10);
    const konu = parseInt(match[3], 10);
    const son_gorulme = match[4];
    const level = match[5];

    userMap.set(username, { username, mesaj, konu, son_gorulme, level });
  }

  return Array.from(userMap.values());
}

async function run() {
  const text = document.getElementById('txt').value.trim();
  if (!text) return setStatus('Metin boş!', 'err');
  
  const btn = document.getElementById('btnRun');
  btn.disabled = true;
  setStatus('İşlem yapılıyor...', 'loading');

  try {
    const cleanData = parseAndDeduplicate(text);
    if (cleanData.length === 0) {
      throw new Error('Listeden eklenecek geçerli oyuncu bulunamadı.');
    }

    const usernames = cleanData.map(u => u.username);
    const { data: existingUsers, error: fetchError } = await supabase
      .from('oyuncular')
      .select('username, mesaj, konu, level')
      .in('username', usernames);

    if (fetchError) throw fetchError;

    const existingMap = new Map();
    if (existingUsers) {
      existingUsers.forEach(u => existingMap.set(u.username, u));
    }

    const finalUpsertList = cleanData.filter(user => {
      const existing = existingMap.get(user.username);
      if (!existing) return true;
      return existing.mesaj !== user.mesaj || existing.konu !== user.konu || existing.level !== user.level;
    });

    if (finalUpsertList.length === 0) {
      setStatus('✅ Herhangi bir veri değişmediği için işlem yapılmadı.', 'ok');
      btn.disabled = false;
      return;
    }

    const { error: upsertError } = await supabase
      .from('oyuncular')
      .upsert(finalUpsertList, { onConflict: 'username' });

    if (upsertError) throw upsertError;

    setStatus(`✅ İşlem Tamam! ${finalUpsertList.length} oyuncunun verisi güncellendi / kaydedildi.`, 'ok');
  } catch (e) { 
    setStatus('❌ Hata: ' + e.message, 'err'); 
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
