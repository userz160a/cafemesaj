<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veri YĂĽkle</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0c10; color: #e2e8f0; font-family: sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #0f1117; border: 1px solid #1e2130; border-radius: 16px; padding: 28px; width: 100%; max-width: 600px; }
  h1 { font-size: 20px; font-weight: 800; background: linear-gradient(to right, #f97316, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
  textarea { width: 100%; height: 320px; background: #141720; border: 1px solid #1e2130; border-radius: 10px; color: #e2e8f0; font-size: 13px; padding: 12px; resize: vertical; outline: none; font-family: monospace; }
  textarea:focus { border-color: #f97316; }
  .btns { display: flex; gap: 10px; margin-top: 14px; }
  button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #btnRun { background: linear-gradient(to right, #f97316, #white; color: white; }
  #btnClear { background: #1e2130; color: #94a3b8; flex: 0.4; }
  #status { margin-top: 14px; padding: 12px; border-radius: 10px; font-size: 13px; display: none; white-space: pre-line; }
  .ok { background: #14532d; color: #86efac; border: 1px solid #166534; }
  .err { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
  .loading { background: #1e2130; color: #94a3b8; border: 1px solid #2d3748; }
</style>
</head>
<body>
<div class="card">
  <h1>đź“‹ Veri YĂĽkle</h1>
  <textarea id="txt" placeholder="ucube.cafe â†’ Ctrl+A â†’ Ctrl+C â†’ buraya Ctrl+V"></textarea>
  <div class="btns">
    <button id="btnRun" onclick="run()">â–¶ GĂĽncelle</button>
    <button id="btnClear" onclick="document.getElementById('txt').value='';setStatus('')">Temizle</button>
  </div>
  <div id="status"></div>
</div>

<script>
const supabaseUrl = 'https://hcxwjnkywsfwviexjopt.supabase.co';
const supabaseKey = 'sb_publishable_ZJFVMWFEHL32yXZXzqT4ZQ_3fNbZTO-';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

function setStatus(msg, type) {
  const el = document.getElementById('status');
  if (!msg) { el.style.display = 'none'; return; }
  el.className = type;
  el.textContent = msg;
  el.style.display = 'block';
}

function parseAndDeduplicate(text) {
  const userMap = new Map();
  const blacklistSet = new Set();
  
  const blacklistParts = text.split(/blacklist/i);
  const mainContent = blacklistParts[0];
  const blacklistContent = blacklistParts.slice(1).join(' ');

  const blacklistMatches = blacklistContent.match(/[^\s]+#[0-9]{4}/g);
  if (blacklistMatches) {
    blacklistMatches.forEach(n => {
      let bNick = n.trim().replace(/^(.*?)([^\s]+#[0-9]{4})$/, '$2');
      blacklistSet.add(bNick);
    });
  }

  const regex = /([^\s]+#[0-9]{4})\s+([\d.]+)\s*(\d+)\s*(\d{2}\/\d{2}\s+\d{2}:\d{2}|-|(?:\d{2}\/\d{2}))/g;
  let match;

  while ((match = regex.exec(mainContent)) !== null) {
    let rawNick = match[1].trim();
    
    let cleanNick = rawNick.replace(/^(?:GĂ¶rĂĽlme|Level|lvl|\d+)*([^\s]+#[0-9]{4})$/i, '$1');
    cleanNick = cleanNick.replace(/^[^a-zA-Z0-9_ÄźĂĽĹźĂ¶Ă§Ä°ÄžĂśĹžĂ–Ă‡]+/, '');

    if (cleanNick.endsWith('#0000') || blacklistSet.has(cleanNick) || !cleanNick.includes('#')) {
      continue;
    }

    let messages = parseInt(match[2].replace(/\./g, ''), 10);
    let topics = parseInt(match[3], 10);
    const last_message = match[4].trim();

    if (messages > 10000) {
      const msgStr = match[2].replace(/\./g, '');
      if (msgStr.length >= 5) {
        messages = parseInt(msgStr.substring(0, msgStr.length - 3), 10);
      }
    }

    if (!isNaN(messages) && !isNaN(topics)) {
      userMap.set(cleanNick, { nick: cleanNick, messages, topics, last_message });
    }
  }

  return Array.from(userMap.values());
}

async function run() {
  const text = document.getElementById('txt').value.trim();
  if (!text) return setStatus('Metin boĹź!', 'err');
  
  const btn = document.getElementById('btnRun');
  btn.disabled = true;
  setStatus('Veriler ayÄ±klanÄ±yor...', 'loading');

  try {
    const currentCleanData = parseAndDeduplicate(text);
    if (currentCleanData.length === 0) {
      throw new Error('Metinden geĂ§erli bir kullanÄ±cÄ± ayÄ±rt edilemedi.');
    }

    setStatus('Eski ucube verileri veritabanÄ±ndan alÄ±nÄ±yor...', 'loading');
    const { data: historyData, error: historyError } = await _supabase
      .from('ucube_history')
      .select('raw_text')
      .eq('id', 1)
      .single();

    const oldUcubeMap = {};
    let hasHistory = false;

    if (!historyError && historyData && historyData.raw_text) {
      hasHistory = true;
      const parsedOldData = parseAndDeduplicate(historyData.raw_text);
      parsedOldData.forEach(u => {
        oldUcubeMap[u.nick] = { messages: u.messages, topics: u.topics };
      });
    }

    setStatus('Supabase canlÄ± verileri kontrol ediliyor...', 'loading');
    const nicks = currentCleanData.map(u => u.nick);
    const { data: supabaseUsers, error: fetchError } = await _supabase
      .from('stats')
      .select('id, nick, messages, topics, last_message')
      .in('nick', nicks);

    if (fetchError) throw fetchError;

    const supabaseMap = new Map();
    if (supabaseUsers) {
      supabaseUsers.forEach(u => supabaseMap.set(u.nick, u));
    }

    const finalUpsertList = [];
    let updatedCount = 0;

    currentCleanData.forEach(incomingUser => {
      const oldUcubeUser = oldUcubeMap[incomingUser.nick];
      const dbUser = supabaseMap.get(incomingUser.nick);

      let msgDiff = 0;
      let topicDiff = 0;

      if (oldUcubeUser) {
        msgDiff = Math.max(0, incomingUser.messages - oldUcubeUser.messages);
        topicDiff = Math.max(0, incomingUser.topics - oldUcubeUser.topics);
      }

      if (dbUser) {
        if (msgDiff > 0 || topicDiff > 0 || dbUser.last_message !== incomingUser.last_message || !hasHistory) {
          const finalMessages = hasHistory ? (dbUser.messages + msgDiff) : dbUser.messages;
          const finalTopics = hasHistory ? (dbUser.topics + topicDiff) : dbUser.topics;

          finalUpsertList.push({
            id: dbUser.id,
            nick: incomingUser.nick,
            messages: finalMessages,
            topics: finalTopics,
            last_message: incomingUser.last_message,
            updated_at: new Date().toISOString()
          });
          if (msgDiff > 0 || topicDiff > 0) updatedCount++;
        }
      } else {
        finalUpsertList.push({
          nick: incomingUser.nick,
          messages: incomingUser.messages,
          topics: incomingUser.topics,
          last_message: incomingUser.last_message,
          updated_at: new Date().toISOString()
        });
        updatedCount++;
      }
    });

    if (finalUpsertList.length > 0) {
      setStatus('Hesaplanan farklar Supabase\'e aktarÄ±lÄ±yor...', 'loading');
      const { error: upsertError } = await _supabase.from('stats').upsert(finalUpsertList);
      if (upsertError) throw upsertError;
    }

    setStatus('Mevcut metin sonraki iĹźlem iĂ§in kaydediliyor...', 'loading');
    const { error: saveError } = await _supabase
      .from('ucube_history')
      .upsert({ id: 1, raw_text: text, updated_at: new Date().toISOString() });

    if (saveError) throw saveError;

    setStatus(`âś… Ä°Ĺźlem TamamlandÄ±!\n\nTemizlenmiĹź veriler baĹźarÄ±yla kÄ±yaslandÄ± ve kaydedildi.\nSayÄ±larÄ± artÄ±Ĺź gĂ¶steren oyuncu sayÄ±sÄ±: ${updatedCount}`, 'ok');

  } catch (e) { 
    setStatus('âťŚ Hata:\n' + e.message, 'err'); 
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
