<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veri Yükle</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0c10; color: #e2e8f0; font-family: sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #0f1117; border: 1px solid #1e2130; border-radius: 16px; padding: 28px; width: 100%; max-width: 600px; }
  h1 { font-size: 20px; font-weight: 800; background: linear-gradient(to right, #f97316, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
  textarea { width: 100%; height: 320px; background: #141720; border: 1px solid #1e2130; border-radius: 10px; color: #e2e8f0; font-size: 13px; padding: 12px; resize: vertical; outline: none; font-family: monospace; }
  textarea:focus { border-color: #f97316; }
  .btns { display: flex; gap: 10px; margin-top: 14px; }
  button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #btnRun { background: linear-gradient(to right, #f97316, #f59e0b); color: white; }
  #btnClear { background: #1e2130; color: #94a3b8; flex: 0.4; }
  #status { margin-top: 14px; padding: 12px; border-radius: 10px; font-size: 13px; display: none; white-space: pre-line; }
  .ok { background: #14532d; color: #86efac; border: 1px solid #166534; }
  .err { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
  .loading { background: #1e2130; color: #94a3b8; border: 1px solid #2d3748; }
</style>
</head>
<body>
<div class="card">
  <h1>📋 Veri Yükle (Dinamik Fark Hesaplayıcı)</h1>
  <textarea id="txt" placeholder="ucube.cafe → Ctrl+A → Ctrl+C → buraya Ctrl+V"></textarea>
  <div class="btns">
    <button id="btnRun" onclick="run()">▶ Güncelle</button>
    <button id="btnClear" onclick="document.getElementById('txt').value='';setStatus('')">Temizle</button>
  </div>
  <div id="status"></div>
</div>

<script>
const supabaseUrl = 'https://hcxwjnkywsfwviexjopt.supabase.co';
const supabaseKey = 'sb_publishable_ZJFVMWFEHL32yXZXzqT4ZQ_3fNbZTO-';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

function setStatus(msg, type) {
  const el = document.getElementById('status');
  if (!msg) { el.style.display = 'none'; return; }
  el.className = type;
  el.textContent = msg;
  el.style.display = 'block';
}

function parseAndDeduplicate(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const userMap = new Map();
  const blacklistSet = new Set();
  let inBlacklistSection = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    if (line.toLowerCase().includes('blacklist')) {
      inBlacklistSection = true;
      continue;
    }

    // Kullanıcı adında mutlaka # karakteri ve 4 haneli sayı kontrolü yapılıyor
    const nickMatch = line.match(/^([^\s]+#[0-9]{4})$/);

    if (inBlacklistSection) {
      if (nickMatch) {
        blacklistSet.add(nickMatch[1]);
      }
      continue;
    }

    if (nickMatch) {
      const nick = nickMatch[1];
      
      // #0000 bot hesaplarını filtrele
      if (nick.endsWith('#0000')) {
        continue;
      }

      let dataLine = "";
      let searchIdx = i + 1;
      
      while (searchIdx < lines.length) {
        const nextLine = lines[searchIdx];
        if (nextLine.toLowerCase().includes('blacklist')) break;
        if (nextLine === nick) { searchIdx++; continue; }
        if (nextLine.match(/^[0-9]+$/)) { searchIdx++; continue; }
        if (nextLine.match(/\d{2}\/\d{2}/) || nextLine.includes('lvl')) {
          dataLine = nextLine;
          break;
        }
        if (nextLine.match(/[^\s]+#[0-9]{4}/)) break;
        dataLine += " " + nextLine;
        searchIdx++;
      }

      if (dataLine) {
        const parts = dataLine.trim().split(/\s+/);
        if (parts.length >= 5) {
          const messages = parseInt(parts[0].replace(/\./g, ''), 10);
          const topics = parseInt(parts[1], 10);
          const last_message = parts[4] + (parts[5] ? " " + parts[5] : "");

          if (!isNaN(messages) && !isNaN(topics)) {
            userMap.set(nick, { nick, messages, topics, last_message });
          }
        }
      }
    }
  }

  blacklistSet.forEach(badUser => {
    userMap.delete(badUser);
  });

  return Array.from(userMap.values());
}

async function run() {
  const text = document.getElementById('txt').value.trim();
  if (!text) return setStatus('Metin boş!', 'err');
  
  const btn = document.getElementById('btnRun');
  btn.disabled = true;
  setStatus('Veriler ayıklanıyor...', 'loading');

  try {
    const cleanData = parseAndDeduplicate(text);
    if (cleanData.length === 0) {
      throw new Error('Metinden geçerli bir kullanıcı (# içeren) ayırt edilemedi.');
    }

    setStatus(`Veritabanındaki mevcut kullanıcılar kontrol ediliyor...`, 'loading');

    // Mevcut tüm kullanıcı kayıtlarını çekiyoruz
    const nicks = cleanData.map(u => u.nick);
    const { data: existingUsers, error: fetchError } = await _supabase
      .from('stats')
      .select('id, nick, messages, topics, last_message')
      .in('nick', nicks);

    if (fetchError) throw fetchError;

    const existingMap = new Map();
    if (existingUsers) {
      existingUsers.forEach(u => existingMap.set(u.nick, u));
    }

    const finalUpsertList = [];
    let updatedCount = 0;

    cleanData.forEach(incomingUser => {
      const existing = existingMap.get(incomingUser.nick);

      if (existing) {
        // Eğer veritabanında kullanıcı zaten varsa: FARKI hesapla
        // Örn: Gelen 1455, Mevcut 1453 ise fark +2 olur. Eğer ucube.cafedeki sayı daha düşük veya eşitse ekleme yapmaz (0 kabul eder)
        const msgDiff = Math.max(0, incomingUser.messages - existing.messages);
        const topicDiff = Math.max(0, incomingUser.topics - existing.topics);

        // Sadece en azından bir değişim/artış varsa listeye ekle
        if (msgDiff > 0 || topicDiff > 0 || existing.last_message !== incomingUser.last_message) {
          finalUpsertList.push({
            id: existing.id, // ID eşleşmesi şart
            nick: incomingUser.nick,
            messages: existing.messages + msgDiff, // Mevcut olana farkı ekle
            topics: existing.topics + topicDiff,   // Mevcut olana farkı ekle
            last_message: incomingUser.last_message,
            updated_at: new Date().toISOString()
          });
          updatedCount++;
        }
      } else {
        // Eğer kullanıcı veritabanında hiç yoksa, sıfırdan ekle
        finalUpsertList.push({
          nick: incomingUser.nick,
          messages: incomingUser.messages,
          topics: incomingUser.topics,
          last_message: incomingUser.last_message,
          updated_at: new Date().toISOString()
        });
        updatedCount++;
      }
    });

    if (finalUpsertList.length === 0) {
      setStatus('✅ İlerleyen/sayısı değişen kimse yok. Tüm veriler zaten güncel.', 'ok');
      btn.disabled = false;
      return;
    }

    setStatus(`${finalUpsertList.length} oyuncunun fark verileri sisteme ekleniyor...`, 'loading');

    // Supabase Upsert işlemi
    const { error: upsertError } = await _supabase
      .from('stats')
      .upsert(finalUpsertList);

    if (upsertError) throw upsertError;

    setStatus(`✅ Başarılı!\nTaranan geçerli oyuncu: ${cleanData.length}\nSayıları artan/güncellenen oyuncu: ${updatedCount}`, 'ok');
  } catch (e) { 
    setStatus('❌ Hata:\n' + e.message, 'err'); 
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
